# Server Configuration
server.port=8080
server.servlet.context-path=/

# Application Name
spring.application.name=bulletin-board

# H2 Database Configuration
# 파일 기반 H2 데이터베이스 (데이터 영속성)
spring.datasource.url=jdbc:h2:file:/app/data/boarddb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

#SQL 초기화 설정 (schema.sql, data.sql 자동 실행)
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# MyBatis Configuration
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.example.board.domain
mybatis.configuration.map-underscore-to-camel-case=true

# Thymeleaf Configuration
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Logging
logging.level.root=INFO
logging.level.com.example.board=DEBUG
logging.level.org.mybatis=DEBUG
